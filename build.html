<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Form</title>
    <link rel="stylesheet" href="build_Structuer.css">
</head>
<body>
    
    <div class="watermark"></div>
    
    <div class="form-container">
        
        <div class="card header-card">
            <input type="text" class="form-title" value="ฟอร์มไม่มีชื่อ"><br>
            <input type="text" class="form-desc" placeholder="คำอธิบายฟอร์ม">
        </div>
        
        <div class="card question-card">
            
            <div class="drag-handle">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="#dadce0"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>
            </div>

            <div class="question-header-row">
                <input type="text" class="question-title-input" value="คำถามไม่ระบุชื่อ">
            </div>

            <div class="option-list">
                
                <div class="option-row">
                    <div class="fake-radio"></div>
                    <input type="text" class="option-input" value="ตัวเลือกที่ 1">
                    <div class="delete-btn" title="นำออก">
                        <svg viewBox ="0 0 24 24" width="24" height="24" fill = "#5f6368" ><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
                    </div>
                </div>
                
                <div class="option-row add-option-row">
                    <div class="fake-radio"></div>
                    <input type="text" class="option-input add-input" value="เพิ่มตัวเลือก" readonly>
                    <span class="add-other-text"> หรือ <a href="#" class="add-other-link">เพิ่ม "อื่นๆ"</a></span>
                </div>
                
            </div>
        </div>

        <div class="submit-container">
            <button id="publish-btn" class="submit-btn">เผยแพร่</button>
        </div>

    </div>

    <div id="black-screen">
        <h1>หน้าจอถูกล็อก</h1>
        <p>กรุณาคลิกกลับมาเพื่อทำข้อสอบต่อ</p>
    </div>

    <script src="build_Script.js"></script>
</body>
</html>
